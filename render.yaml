# Render Blueprint — auto-deploy from GitHub
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: taskflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
